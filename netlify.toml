[build]
  command = "pnpm run build && pnpm run db:prepare"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.33.0"
  SKIP_RUNTIME_MIGRATIONS = "true"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "pg", "knex"]
  included_files = [
    "openapi.yml",
    "modules/**/migrations/**",
    "dist/database/migrations/**",
    "dist/database/seeds/**",
    "dist/modules/**",
  ]

[[redirects]]
  force = true
  from = "/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
